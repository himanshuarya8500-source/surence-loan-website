<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surence Pvt Ltd | Official DSA Partner</title>

<meta name="description" content="Apply for instant personal, business & home loans with Surence Pvt Ltd. Fast approval, no hidden charges, trusted DSA partner.">

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {margin:0;background:#030b14;color:#fff;font-family:'DM Sans';}
.container {max-width:1200px;margin:auto;padding:80px 5%;}
h1,h2{font-family:'Sora';}
.btn{background:#00e5a0;color:#000;padding:14px;border-radius:8px;font-weight:700;border:none;width:100%;cursor:pointer;}
.form-control{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;background:#1e293b;color:white;}
.form-box{background:#0c1e30;padding:25px;border-radius:15px;}
.fab{position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;font-size:22px;text-decoration:none;}
</style>
</head>

<body>

<div class="container">

<h1>Get Instant Loan up to ₹50 Lakhs</h1>
<p>Fast Approval | Trusted | No Hidden Charges</p>

<div class="form-box">

<h2>Check Your Eligibility</h2>

<form id="leadForm" onsubmit="submitLead(event)">

<input id="leadName" class="form-control" placeholder="Full Name" required>

<input id="leadPhone" class="form-control" placeholder="Phone Number" required>

<select id="leadAmount" class="form-control">
<option>Upto ₹5 Lakh</option>
<option>₹5L – ₹15L</option>
<option>₹15L – ₹50L</option>
<option>₹50L+</option>
</select>

<select id="leadLoan" class="form-control">
<option>Personal Loan</option>
<option>Business Loan</option>
<option>Home Loan</option>
<option>Loan Against Property</option>
</select>

<button id="submitBtn" class="btn">Apply Now</button>

</form>

</div>

</div>

<a href="https://wa.me/918969881194" class="fab">💬</a>

<script>
function submitLead(e){
e.preventDefault();

let name=document.getElementById("leadName").value.trim();
let phone=document.getElementById("leadPhone").value.trim();
let amount=document.getElementById("leadAmount").value;
let loan=document.getElementById("leadLoan").value;
let btn=document.getElementById("submitBtn");

// validation
if(name.length<3){alert("Enter valid name");return;}
if(!/^[6-9][0-9]{9}$/.test(phone)){alert("Enter valid number");return;}

// loading
btn.disabled=true;
btn.innerText="Processing...";

let msg=`🔥 NEW LOAN LEAD

Name: ${name}
Phone: ${phone}
Amount: ${amount}
Loan: ${loan}`;

setTimeout(()=>{
window.open(`https://wa.me/918969881194?text=${encodeURIComponent(msg)}`,"_blank");
btn.disabled=false;
btn.innerText="Apply Now";
document.getElementById("leadForm").reset();
},800);
}
</script>

</body>
</html>
