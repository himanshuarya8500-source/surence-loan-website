<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surence Pvt Ltd | Official DSA Partner</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030b14;
            --bg-mid: #071525;
            --bg-light: #0c1e30;
            --primary: #00e5a0;
            --primary-dim: rgba(0,229,160,0.12);
            --primary-hover: #00c98a;
            --accent: #3b82f6;
            --text-main: #f0f6ff;
            --text-muted: #7a94b0;
            --glass-bg: rgba(7, 21, 37, 0.85);
            --glass-border: rgba(255,255,255,0.07);
            --focus-ring: rgba(0,229,160,0.2);
            --card-bg: rgba(12,30,48,0.6);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'DM Sans', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }

        /* Grain texture overlay */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9999; opacity: 0.4;
        }

        /* Grid BG */
        .grid-bg {
            position: fixed; inset: 0; z-index: 0;
            background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 80px 5%; position: relative; z-index: 1; }
        h1, h2, h3 { font-family: 'Sora', sans-serif; color: var(--text-main); }
        .section-title { text-align: center; font-size: clamp(26px, 4vw, 38px); margin-bottom: 16px; font-weight: 700; letter-spacing: -0.5px; }
        .section-title span { color: var(--primary); }
        .section-subtitle { text-align: center; color: var(--text-muted); max-width: 640px; margin: 0 auto 50px auto; font-size: 15.5px; line-height: 1.7; }

        /* \u2500\u2500\u2500 NAVBAR \u2500\u2500\u2500 */
        header { position: fixed; top: 0; width: 100%; background: rgba(3,11,20,0.92); backdrop-filter: blur(16px); z-index: 1000; border-bottom: 1px solid var(--glass-border); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 5%; max-width: 1200px; margin: 0 auto; }
        .logo { font-family: 'Sora', sans-serif; font-size: 24px; font-weight: 800; background: linear-gradient(90deg, #00e5a0, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 32px; list-style: none; align-items: center; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-weight: 500; font-size: 14.5px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .nav-cta { background: var(--primary) !important; color: #000 !important; padding: 10px 22px; border-radius: 8px; font-weight: 700 !important; font-size: 14px !important; -webkit-text-fill-color: #000 !important; }
        .menu-toggle { display: none; font-size: 26px; cursor: pointer; color: white; }

        /* \u2500\u2500\u2500 TRUST BANNER \u2500\u2500\u2500 */
        .trust-banner {
            background: linear-gradient(90deg, rgba(0,229,160,0.08), rgba(59,130,246,0.08));
            border-bottom: 1px solid var(--glass-border);
            padding: 10px 0; text-align: center;
            font-size: 13.5px; font-weight: 500; color: #94aec8;
            margin-top: 65px; position: relative; z-index: 1;
        }
        .trust-banner span { color: var(--primary); font-weight: 700; }

        /* \u2500\u2500\u2500 HERO \u2500\u2500\u2500 */
        .hero { display: flex; align-items: center; gap: 60px; min-height: 88vh; padding-top: 40px; }
        .hero-content { flex: 1; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--primary-dim); border: 1px solid rgba(0,229,160,0.3); color: var(--primary); padding: 8px 16px; border-radius: 100px; font-size: 13px; font-weight: 600; margin-bottom: 24px; letter-spacing: 0.3px; }
        .hero-badge::before { content: '\u25cf'; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .hero-content h1 { font-size: clamp(32px, 5vw, 60px); line-height: 1.12; margin-bottom: 20px; letter-spacing: -1px; }
        .hero-content h1 .line2 { background: linear-gradient(90deg, #00e5a0, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-content p { font-size: 16.5px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.7; max-width: 520px; }
        .hero-stats { display: flex; gap: 30px; flex-wrap: wrap; }
        .stat { text-align: left; }
        .stat-num { font-family: 'Sora', sans-serif; font-size: 26px; font-weight: 800; color: var(--primary); line-height: 1; }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

        /* \u2500\u2500\u2500 FORM BOX \u2500\u2500\u2500 */
        .form-box { flex: 1; background: var(--glass-bg); backdrop-filter: blur(24px); border: 1px solid var(--glass-border); padding: 38px; border-radius: 24px; max-width: 460px; width: 100%; box-shadow: 0 30px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06); }
